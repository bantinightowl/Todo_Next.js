# Nixpacks Configuration (used by Railway, Render, Fly.io)
# https://nixpacks.com/docs/configuration/file

[phases.setup]
nixPkgs = ["nodejs-20_x"]

[phases.install]
cmds = ["npm ci --only=production"]

[phases.build]
cmds = ["npm run build"]

[start]
cmd = "node server.js"

[variables]
NODE_ENV = "production"
PORT = "3000"
